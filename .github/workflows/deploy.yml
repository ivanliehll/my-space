name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 當你推送架構到 main 分支時觸發
  repository_dispatch:
    types: [ content_update ] # 當你的「內容倉庫」發出更新通知時觸發
  workflow_dispatch: # 允許你手動點擊觸發

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      
      # 關鍵修正：在 Build 之前，先把內容倉庫的文章抓過來
      - name: Sync Content
        env:
          ENABLE_CONTENT_SYNC: true
          # 填入你自己的文章內容倉庫網址（如果是私有的，下面那行 TOKEN 就會派上用場）
          CONTENT_REPO_URL: "https://github.com/ivanliehll/my-space.git"
          CONTENT_REPO_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: pnpm run sync-content

      - name: Build site
        run: pnpm run build
        
      # 關鍵修正：直接將產出的網頁上傳給 GitHub Pages 託管
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
